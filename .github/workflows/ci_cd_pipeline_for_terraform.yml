name: Deploy FastAPI App to AWS with Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'aws_infrastructure_construction_from_terraform/terraform/**'
      - 'aws_infrastructure_construction_from_terraform/app/**'

jobs:
  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aws_infrastructure_construction_from_terraform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: fastapi-app-repo
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-infrastructure:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    needs: build-and-push-image

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        run: terraform init

      # --- 強制クリーンアップフェーズ ---
      - name: Terraform Refresh (Sync state with real world)
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        continue-on-error: true
        run: terraform refresh

      - name: Terraform Destroy (1st attempt)
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        continue-on-error: true
        run: terraform destroy -auto-approve

      - name: Terraform Destroy (2nd attempt - cleanup remaining)
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        continue-on-error: true
        run: terraform destroy -auto-approve

      - name: Terraform State List (for debugging)
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        continue-on-error: true
        run: terraform state list

      # --- 再構築フェーズ ---
      - name: Terraform Plan
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        run: terraform apply -auto-approve