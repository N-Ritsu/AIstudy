# .github/workflows/ci_cd_pipeline.yml (修正後)

name: Deploy FastAPI App to AWS with Terraform

on:
  push:
    branches:
      - main

jobs:
  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # --- ★ 変更点 1: デフォルトの作業ディレクトリを設定 ---
    # このジョブ内の全てのステップは、このディレクトリを基準に実行されるようになります。
    defaults:
      run:
        working-directory: ./aws_infrastructure_construction_from_terraform

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/login-ecr@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: fastapi-app-repo
          IMAGE_TAG: latest
        run: |
          # --- ★ 変更点 2: Dockerビルドコマンドは working-directory 内で実行される ---
          # Dockerfileのパス (-f) やコンテキスト (.) は、
          # working-directoryからの相対パスになるため、変更は不要です。
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-infrastructure:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    needs: build-and-push-image
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        # --- ★ 変更点 3: Terraformコマンドを実行するディレクトリを指定 ---
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        run: terraform init

      - name: Terraform Apply
        # --- ★ 変更点 4: こちらも同様にディレクトリを指定 ---
        working-directory: ./aws_infrastructure_construction_from_terraform/terraform
        run: terraform apply -auto-approve